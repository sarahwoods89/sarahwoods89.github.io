<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Sarah Woods</title>
  <link rel="stylesheet" href="../sarahWoodsStyle/style.css">
  <link rel="icon" href="/images/logo/sWFaviconSmall.png" type="image/png">
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: #fff;
      color: #222;
      margin: 0;
    }

    .contact-wrap {
      max-width: 560px;
      margin: 80px auto 100px;
      padding: 0 24px;
      text-align: center;
    }

    .contact-wrap h1 {
      font-size: 1.8rem;
      font-weight: 400;
      margin: 0 0 20px;
    }

    .contact-wrap .intro {
      font-size: 1rem;
      color: #666;
      line-height: 1.85;
      margin: 0 auto 48px;
    }

    .contact-email {
      display: inline-block;
      font-size: 1rem;
      color: #222;
      text-decoration: none;
      border-bottom: 1px solid #222;
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: 48px;
    }

    .contact-email:hover {
      color: #2102d1;
      border-color: #2102d1;
    }

    .contact-socials {
      margin-top: 40px;
      font-size: 0.85rem;
      color: #999;
      line-height: 2;
    }

    .contact-socials a {
      color: #555;
      text-decoration: none;
      border-bottom: 1px solid #ddd;
      padding-bottom: 1px;
      transition: color 0.2s;
    }

    .contact-socials a:hover {
      color: #222;
    }

    html.dark-mode .contact-wrap h1 {
      color: #e0e0e0;
    }

    html.dark-mode .contact-wrap .intro {
      color: #aaa;
    }

    html.dark-mode .contact-email {
      color: #e0e0e0;
      border-color: #e0e0e0;
    }

    html.dark-mode .contact-socials {
      color: #777;
    }

    html.dark-mode .contact-socials a {
      color: #aaa;
      border-color: #444;
    }

    @media (max-width: 560px) {
      .contact-wrap {
        margin: 50px auto 70px;
      }

      .contact-wrap h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <div id="site-header"></div>

  <div class="contact-wrap">
    <h1>Get in Touch</h1>
    <p class="intro">Whether it's a question about a print, a commission enquiry, or just a hello — I'd love to hear from you.</p>

    <a href="mailto:hello@sarahwoods.xyz" class="contact-email">hello@sarahwoods.xyz</a>

    <div class="contact-socials">
      <p>Or find me on Instagram</p>
      <p>
        <a href="https://www.instagram.com/sarahwoods_art" target="_blank" rel="noopener">@sarahwoods_art</a>
        &nbsp;&nbsp;·&nbsp;&nbsp;
        <a href="https://www.instagram.com/sarahwords_studio/" target="_blank" rel="noopener">@sarahwords_studio</a>
      </p>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="/sarahWoodsStyle/include.js"></script>
</body>
</html>
