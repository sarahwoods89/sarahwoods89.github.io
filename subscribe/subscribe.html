<!DOCTYPE html>
<html lang="en"> <!-- x23170662 -->
<head> <!-- most pages have hte same head info except when there is bootstrap involved like this. the index page also has linsk to allow the use of slick REF w3schools -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Subscribe to Sarah Woods' updates and be the first to know about her new artworks, projects, and exhibitions.">
    <title>Subscribe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../sarahWoodsStyle/style.css">
    <link rel="icon" href="../images/logo/sWFavicon.png" type="image/SW logo">
</head>    
<body>
  <div id="site-header"></div>

    <div id="main"> <!-- This main page is holding a subscription container from bootstrap. the subscription contianer asks for name and email and will not accept an email without an @ and it will not allow someone to press submit without a name either  REF w3schools-->
        <div class="subscribe-container">
            <div class="text-center mb-4">
                <p>Be the first to know about new works, writing, and projects.</p>
            </div>
            <div class="row justify-content-center">
                <div class="col-md-6 col-sm-10">
                    <form id="subscribe-form" class="bg-light p-4 rounded shadow">
                        <div class="mb-3">
                            <label for="name" class="form-label">Your Name</label>
                            <input type="text" class="form-control" id="name" placeholder="Type here" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Your Email</label>
                            <input type="email" class="form-control" id="email" placeholder="Type here" required>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary w-100 py-2">Subscribe</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

  <div id="site-footer"></div>

    <!-- Thank You Modal added in to have another popup box to say thank you to anyoen who signs up to be a subscriber  ref w3schools -->
    <div class="modal fade" id="thankYouModal" tabindex="-1" aria-labelledby="thankYouModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="thankYouModalLabel">Thank You!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Thank you so so much for subscribing! I promise I won't spam you.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
<!-- bootstrap script that spits out a thank you once a name and email has been received  ref w3schools -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("subscribe-form").addEventListener("submit", function(event) {
            event.preventDefault();
            const thankYouModal = new bootstrap.Modal(document.getElementById("thankYouModal"));
            thankYouModal.show();
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
        });
    </script>
    <script src="/sarahWoodsStyle/include.js"></script>
</body>
</html>
