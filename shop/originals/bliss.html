<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>"Bliss" Original | Sarah Woods</title>
  <link rel="stylesheet" href="../../sarahWoodsStyle/style.css">
  <link rel="icon" href="/images/logo/sWFaviconSmall.png" type="image/png">
  <style>
    body { font-family: 'Helvetica Neue', sans-serif; color: #222; background: #fff; }
    .product-layout { display: flex; gap: 60px; max-width: 1100px; margin: 0 auto; padding: 40px 40px 80px; align-items: flex-start; }
    .product-gallery { flex: 1; }
    .main-image-wrap { border-radius: 12px; overflow: hidden; background: #f2f2f2; }
    .main-image-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; transition: opacity 0.25s ease; }
    .thumbnails { display: flex; gap: 10px; margin-top: 12px; }
    .thumb { width: 72px; height: 72px; object-fit: contain; border-radius: 6px; cursor: pointer; opacity: 0.55; transition: opacity 0.2s ease; border: 2px solid transparent; }
    .thumb:hover { opacity: 0.85; }
    .thumb.active { opacity: 1; border-color: #222; }
    .product-info { flex: 1; }
    .product-info h2 { font-size: 1.8rem; font-weight: 400; margin: 0 0 20px; }
    .product-info p { font-size: 0.95rem; color: #555; line-height: 1.8; margin: 0 0 14px; }
    .product-info p strong { color: #222; }
    .price { font-size: 1.5rem; font-weight: 500; color: #222; margin: 20px 0 24px; }
    .buy-options { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
    @media (max-width: 768px) {
      .product-layout { flex-direction: column; padding: 20px 20px 60px; gap: 32px; }
      .thumb { width: 56px; height: 56px; }
    }
  </style>
</head>
<body>

  <div id="site-header"></div>

  <div class="product-layout">

    <div class="product-gallery">
      <div class="main-image-wrap">
        <img id="mainImg" src="../images/women/bliss.webp" alt="Bliss">
      </div>
      <div class="thumbnails">
        <img class="thumb active" src="../images/women/bliss.webp" alt="Bliss">
        <img class="thumb" src="../images/women/blissRoom1.webp" alt="Bliss in room">
        <img class="thumb" src="interiorsBliss.jpg" alt="Bliss interior">
        <img class="thumb" src="closeupBLISS1.jpg" alt="Bliss closeup 1">
        <img class="thumb" src="closeupBLISS2.jpg" alt="Bliss closeup 2">
      </div>
    </div>

    <div class="product-info">
      <a href="/shop/originals/" class="back-link">← Back to Originals</a>
      <h2>Bliss</h2>
      <p><strong>Medium:</strong> Oil on canvas board</p>
      <p><strong>Size:</strong> 20 × 20 inches (50.8 × 50.8 cm)</p>
      <p><strong>Includes:</strong> Certificate of authenticity</p>
      <p>One of a kind original painting. This is the only one in existence.</p>
      <div class="price">€890</div>
      <div class="buy-options">
        <a href="mailto:sarahwoods06@gmail.com?subject=Purchase Enquiry – Bliss Original&body=Hi Sarah, I am interested in purchasing the original painting 'Bliss' (€890). Please let me know how to proceed." class="btn-buy">Enquire to Purchase</a>
      </div>
    </div>

  </div>

  <div id="site-footer"></div>

  <script>
    const mainImg = document.getElementById('mainImg');
    document.querySelectorAll('.thumb').forEach(function(thumb) {
      thumb.addEventListener('click', function() {
        mainImg.style.opacity = '0';
        setTimeout(function() { mainImg.src = thumb.src; mainImg.style.opacity = '1'; }, 150);
        document.querySelectorAll('.thumb').forEach(function(t) { t.classList.remove('active'); });
        thumb.classList.add('active');
      });
    });
  </script>

  <script src="/sarahWoodsStyle/include.js"></script>
</body>
</html>
