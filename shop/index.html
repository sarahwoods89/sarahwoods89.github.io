<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop | Sarah Woods</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../sarahWoodsStyle/style.css" />
  <link rel="icon" href="/images/logo/sWFaviconSmall.png" type="image/png" />
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      color: #222;
      background-color: #fff;
    }

    h1 {
      font-family: 'Helvetica Neue', sans-serif;
      font-weight: 400;
      margin: 60px 0 50px;
      text-align: center;
      font-size: 1.8rem;
      letter-spacing: 1px;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .shop-card {
      text-decoration: none;
      color: inherit;
      display: block;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .shop-card:hover {
      transform: translateY(-5px);
    }

    .shop-card-image {
      border-radius: 12px;
      overflow: hidden;
    }

    .shop-card-image img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      filter: brightness(92%);
      transition: filter 0.4s ease;
    }

    .shop-card:hover .shop-card-image img {
      filter: brightness(100%);
    }

    .shop-card-body {
      padding: 14px 4px 0;
      text-align: left;
    }

    .shop-card-body h3 {
      font-size: 1rem;
      font-weight: 500;
      margin: 0 0 6px;
      letter-spacing: 0.5px;
    }

    .view-link {
      font-size: 0.82rem;
      color: #888;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 1px;
      transition: color 0.3s, border-color 0.3s;
    }

    .shop-card:hover .view-link {
      color: #222;
      border-color: #222;
    }

    @media (max-width: 768px) {
      .shop-grid {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 0 16px 50px;
      }

      h1 {
        margin: 40px 0 30px;
      }
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <h1>Shop Collections</h1>

  <div class="shop-grid">

    <!-- Sarah Words -->
    <a href="sarahwords/" class="shop-card">
      <div class="shop-card-image">
        <img src="images/sarahwords/fifty50.jpg" alt="Sarah Words Collection" loading="lazy">
      </div>
      <div class="shop-card-body">
        <h3>Sarah Words</h3>
        <span class="view-link">View Collection →</span>
      </div>
    </a>

    <!-- Florals -->
    <a href="florals/" class="shop-card">
      <div class="shop-card-image">
        <img src="images/abstracts/onTheHill.jpg" alt="Florals Collection" loading="lazy">
      </div>
      <div class="shop-card-body">
        <h3>Florals</h3>
        <span class="view-link">View Collection →</span>
      </div>
    </a>

    <!-- Women -->
    <a href="women/women.html" class="shop-card">
      <div class="shop-card-image">
        <img src="collection-covers/women.webp" alt="Women Collection" loading="lazy">
      </div>
      <div class="shop-card-body">
        <h3>Women</h3>
        <span class="view-link">View Collection →</span>
      </div>
    </a>

    <!-- Abstracts -->
    <a href="abstracts/abstracts.html" class="shop-card">
      <div class="shop-card-image">
        <img src="collection-covers/abstracts.webp" alt="Abstracts Collection" loading="lazy">
      </div>
      <div class="shop-card-body">
        <h3>Abstracts</h3>
        <span class="view-link">View Collection →</span>
      </div>
    </a>

  </div>

  <div id="site-footer"></div>
  <script src="/sarahWoodsStyle/include.js"></script>
</body>
</html>
