<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop – Sarah Woods</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../sarahWoodsStyle/style.css" />
  <link rel="icon" href="/images/logo/sWFaviconSmall.png" type="image/png" />
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      color: #222;
      background-color: #fff;
    }

    h1 {
      font-weight: 400;
      margin: 60px 0 50px;
      text-align: center;
      font-size: 1.8rem;
      letter-spacing: 1px;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .shop-card {
      text-decoration: none;
      color: inherit;
      display: block;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .shop-card:hover {
      transform: translateY(-5px);
    }

    .shop-card-image {
      border-radius: 12px;
      overflow: hidden;
    }

    .shop-card-image img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      filter: brightness(92%);
      transition: filter 0.4s ease;
    }

    .shop-card:hover .shop-card-image img {
      filter: brightness(100%);
    }

    .shop-card-body {
      padding: 14px 4px 0;
      text-align: left;
    }

    .shop-card-body h3 {
      font-size: 1rem;
      font-weight: 500;
      margin: 0 0 6px;
      letter-spacing: 0.5px;
    }

    .shop-card-body a {
      font-size: 0.82rem;
      color: #888;
      text-decoration: none;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 1px;
      transition: color 0.3s, border-color 0.3s;
    }

    .shop-card-body a:hover {
      color: #222;
      border-color: #222;
    }

    @media (max-width: 768px) {
      .shop-grid {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 0 16px 50px;
      }

      h1 {
        margin: 40px 0 30px;
      }
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div id="header" class="d-flex justify-content-between align-items-center px-4 py-3">
    <div id="header-logo">
      <a href="/">
        <img src="../images/logo/sWLogoVectorWithName.png" alt="Logo" class="logo">
      </a>
    </div>
    <div id="header-nav" class="d-flex gap-4">
      <a href="/">HOME</a>
      <a href="/about/">ABOUT</a>
      <a href="/shop/" class="fw-bold">SHOP</a>
    </div>
  </div>

  <h1>Shop Collections</h1>

  <div class="shop-grid">

    <!-- Women -->
    <a href="women/women.html" class="shop-card">
      <div class="shop-card-image">
        <img src="collection-covers/women.png" alt="Women Collection" loading="lazy">
      </div>
      <div class="shop-card-body">
        <h3>Women</h3>
        <a href="women/women.html">View Collection →</a>
      </div>
    </a>

    <!-- Abstracts -->
    <a href="abstracts/abstracts.html" class="shop-card">
      <div class="shop-card-image">
        <img src="collection-covers/abstracts.png" alt="Abstracts Collection" loading="lazy">
      </div>
      <div class="shop-card-body">
        <h3>Abstracts</h3>
        <a href="abstracts/abstracts.html">View Collection →</a>
      </div>
    </a>

    <!-- Sarah Words -->
    <a href="sarahwords/" class="shop-card">
      <div class="shop-card-image">
        <img src="collection-covers/sarahWordsCover.png" alt="Sarah Words Collection" loading="lazy">
      </div>
      <div class="shop-card-body">
        <h3>Sarah Words</h3>
        <a href="sarahwords/">View Collection →</a>
      </div>
    </a>

  </div>

  <!-- Footer -->
  <footer id="footer">
    <p>&copy; 2024 Sarah Woods Art. All Rights Reserved.</p>
    <p>
      <a href="https://instagram.com/sarahwoods_art" title="follow on Instagram">
        <img src="../images/socials/instagramFooterIcon.png" alt="Instagram Logo">
      </a>
      <a href="https://linktr.ee/sarahwoodsartist" title="Linktree">
        <img src="../images/socials/linktreeFooterIcon.png" alt="Linktree Logo">
      </a>
      <a href="mailto:sarahwoodsartist@gmail.com" title="email me">
        <img src="../images/socials/emailFooterIcon.png" alt="Email Logo">
      </a>
    </p>
  </footer>
</body>
</html>
