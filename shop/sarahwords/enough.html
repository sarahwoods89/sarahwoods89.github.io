<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>"Enough" | Sarah Woods</title>
  <link rel="stylesheet" href="../../sarahWoodsStyle/style.css">
  <link rel="icon" href="/images/logo/sWFaviconSmall.png" type="image/png">
  <style>
    body { font-family: 'Helvetica Neue', sans-serif; color: #222; background: #fff; }
    .product-layout { display: flex; gap: 60px; max-width: 1100px; margin: 0 auto; padding: 40px 40px 80px; align-items: flex-start; }
    .product-gallery { flex: 1; }
    .main-image-wrap { border-radius: 12px; overflow: hidden; background: #f2f2f2; }
    .main-image-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; transition: opacity 0.25s ease; }
    .product-info { flex: 1; }
    .product-info h2 { font-size: 1.8rem; font-weight: 400; margin: 0 0 20px; }
    .product-info p { font-size: 0.95rem; color: #555; line-height: 1.8; margin: 0 0 14px; }
    .product-info p strong { color: #222; }
    .product-info blockquote { font-size: 1rem; color: #444; line-height: 1.9; font-style: italic; border-left: 2px solid #ddd; padding-left: 16px; margin: 0 0 20px; }
    .buy-options { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
    @media (max-width: 768px) {
      .product-layout { flex-direction: column; padding: 20px 20px 60px; gap: 32px; }
    }
  </style>
</head>
<body>

  <div id="site-header"></div>

  <div class="product-layout">

    <div class="product-gallery">
      <div class="main-image-wrap">
        <img src="/shop/images/sarahwords/enoughToKnow.jpg" alt="Enough – Sarah Words">
      </div>
    </div>

    <div class="product-info">
      <a href="/shop/sarahwords/" class="back-link">← Back to Sarah Words</a>
      <h2>Enough</h2>
      <blockquote>I don't know where we come from, I don't know where we go. I feel that you're around me, and that's enough to know.</blockquote>
      <p><strong>Edition:</strong> Open edition</p>
      <p><strong>Print Type:</strong> Hahnemühle fine art papers from The Copperhouse Gallery.</p>
      <p><strong>Options:</strong></p>
      <div class="buy-options">
        <!-- REPLACE href with Stripe payment link when created -->
        <a href="#" target="_blank" class="btn-buy">Buy Mini – €55</a>
      </div>
    </div>

  </div>

  <div id="site-footer"></div>

  <script src="/sarahWoodsStyle/include.js"></script>
</body>
</html>
