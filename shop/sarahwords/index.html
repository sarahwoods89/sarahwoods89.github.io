<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sarah Words – Sarah Woods</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Global site styles -->
  <link rel="stylesheet" href="/sarahWoodsStyle/style.css" />

  <!-- Favicon -->
  <link rel="icon" href="/images/logo/sWFaviconSmall.png" type="image/png" />

  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background-color: #fff;
      color: #222;
    }

    h1 {
      text-align: center;
      margin: 60px 0 40px;
      font-weight: 500;
    }

    .product-card {
      border: none;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
    }

    .product-card img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 12px;
    }

    .product-title {
      margin-top: 12px;
      font-size: 0.95rem;
      text-align: center;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>

  <div id="site-header"></div>

  <!-- Main -->
  <div class="container">
    <a href="/shop/" class="back-link">← Back to Shop</a>
    <h1>Sarah Words</h1>

    <div class="row g-4 justify-content-center">

      <!-- 50/Fifty -->
      <div class="col-md-4 col-sm-6">
        <a href="fifty.html" style="text-decoration: none; color: inherit;">
          <div class="product-card">
            <img src="/shop/images/sarahwords/fifty50.jpg" alt="50/Fifty">
            <div class="product-title">50/Fifty</div>
          </div>
        </a>
      </div>

      <!-- Finding Joy -->
      <div class="col-md-4 col-sm-6">
        <a href="findingJoy.html" style="text-decoration: none; color: inherit;">
          <div class="product-card">
            <img src="/shop/images/sarahwords/sarahWordsCollectionCover.jpg" alt="Finding Joy">
            <div class="product-title">Finding Joy</div>
          </div>
        </a>
      </div>

      <!-- Enough -->
      <div class="col-md-4 col-sm-6">
        <a href="enough.html" style="text-decoration: none; color: inherit;">
          <div class="product-card">
            <img src="/shop/images/sarahwords/enoughToKnow.jpg" alt="Enough">
            <div class="product-title">Enough</div>
          </div>
        </a>
      </div>

      <!-- Try the Opposite -->
      <div class="col-md-4 col-sm-6">
        <a href="tryTheOpposite.html" style="text-decoration: none; color: inherit;">
          <div class="product-card">
            <!-- REPLACE src with actual scan image when available -->
            <img src="/shop/images/sarahwords/tryTheThing.png" alt="Try the Opposite">
            <div class="product-title">Try the Opposite</div>
          </div>
        </a>
      </div>

    </div>
  </div>

  <div id="site-footer"></div>

  <script src="/sarahWoodsStyle/include.js"></script>
</body>
</html>
