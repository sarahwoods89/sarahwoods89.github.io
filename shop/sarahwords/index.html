<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sarah Words – Sarah Woods</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Global site styles -->
  <link rel="stylesheet" href="/sarahWoodsStyle/style.css" />

  <!-- Favicon -->
  <link rel="icon" href="/images/logo/sWFavicon.png" type="image/png" />

  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background-color: #fff;
      color: #222;
    }

    h1 {
      text-align: center;
      margin: 60px 0 40px;
      font-weight: 500;
    }

    .product-card {
      border: none;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
    }

    .product-card img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 12px;
    }

    .product-title {
      margin-top: 12px;
      font-size: 0.95rem;
      text-align: center;
      letter-spacing: 0.5px;
    }

    footer {
      margin-top: 80px;
      padding: 30px 0;
      text-align: center;
      font-size: 0.9rem;
      color: #444;
    }

    footer img {
      height: 20px;
      margin: 0 10px;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div id="header" class="d-flex justify-content-between align-items-center px-4 py-3">
    <div id="header-logo">
      <a href="/">

      </a>
    </div>

    <div id="header-nav" class="d-flex gap-4">
      <a href="/">HOME</a>
      <a href="/about/">ABOUT</a>
      <a href="/shop/" class="fw-bold">SHOP</a>

  </div>

  <div class="container">

    <div class="row g-4 justify-content-center">

      <div class="col-md-4 col-sm-6">
        <div class="product-card">
          <img src="/shop/images/sarahwords/tryTheThing.png" alt="Sarah Words Print">

        </div>
      </div>

      <!-- Placeholder Item 2 -->
      <div class="col-md-4 col-sm-6">
        <div class="product-card">
          <img src="/shop/images/sarahwords/tryTheThing.png" alt="Sarah Words Print">

        </div>
      </div>

          <div class="product-title">Sarah Words — Print Title</div>
        </div>

    </div>
  </div>

  <!-- Footer -->
  <footer>

    <p>
      <a href="https://instagram.com/sarahwoods_art">

      </a>
      <a href="https://linktr.ee/sarahwoodsartist">
        <img src="/images/socials/linktreeFooterIcon.png" alt="Linktree">
      </a>
      <a href="mailto:sarahwoodsartist@gmail.com">
        <img src="/images/socials/emailFooterIcon.png" alt="Email">
      </a>
    </p>

</html>
