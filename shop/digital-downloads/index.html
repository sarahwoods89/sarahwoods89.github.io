<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digital Downloads | Sarah Woods</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Global site styles -->
  <link rel="stylesheet" href="/sarahWoodsStyle/style.css" />

  <!-- Favicon -->
  <link rel="icon" href="/images/logo/sWFaviconSmall.png" type="image/png" />

  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background-color: #fff;
      color: #222;
    }

    h1 {
      text-align: center;
      margin: 60px 0 10px;
      font-weight: 500;
    }

    .section-intro {
      text-align: center;
      max-width: 560px;
      margin: 0 auto 40px;
      color: #666;
      font-size: 0.95rem;
      line-height: 1.7;
      padding: 0 20px;
    }

    .product-card {
      border: none;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
    }

    .product-card img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 12px;
      background: #f2f2f2;
    }

    .product-title {
      margin-top: 12px;
      font-size: 0.95rem;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .product-subtitle {
      margin-top: 2px;
      font-size: 0.8rem;
      text-align: center;
      color: #888;
    }
  </style>
</head>

<body>

  <div id="site-header"></div>

  <!-- Main -->
  <div class="container">
    <a href="/shop/" class="back-link">← Back to Shop</a>
    <h1>Digital Downloads</h1>
    <p class="section-intro">Instant downloads in the Sarah Words style, designed to print and write in, or import straight into GoodNotes or Notability.</p>

    <div class="row g-4 justify-content-center">

      <!-- Three is a Magic Number -->
      <div class="col-md-6 col-sm-6">
        <a href="three-is-a-magic-number.html" style="text-decoration: none; color: inherit;">
          <div class="product-card">
            <img src="/shop/images/digital-downloads/coverForLemonSqueezy.png" alt="Three is a Magic Number planner">
            <div class="product-title">Three is a Magic Number</div>
            <div class="product-subtitle">12 Week Planner · Digital Download</div>
          </div>
        </a>
      </div>

      <!-- Your One Life -->
      <div class="col-md-6 col-sm-6">
        <a href="your-one-life.html" style="text-decoration: none; color: inherit;">
          <div class="product-card">
            <img src="/shop/images/digital-downloads/yourOneLifeCoverImage.jpg" alt="Your One Life print" style="object-fit: contain; background-color: #E9CFC2;">
            <div class="product-title">Your One Life</div>
            <div class="product-subtitle">Free Print · Digital Download</div>
          </div>
        </a>
      </div>

    </div>
  </div>

  <div id="site-footer"></div>

  <script src="/sarahWoodsStyle/include.js"></script>
</body>
</html>
