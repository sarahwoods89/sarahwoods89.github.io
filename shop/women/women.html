<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Women Collection | Sarah Woods</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../sarahWoodsStyle/style.css">
  <link rel="icon" href="/images/logo/sWFaviconSmall.png" type="image/png">
  <style>
    h1 {
      font-weight: 500;
      margin: 20px 0 40px;
      font-family: 'Helvetica Neue', sans-serif;
    }

    .art-card a {
      text-decoration: none;
      color: inherit;
    }

    .art-card {
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .art-card:hover {
      transform: translateY(-5px);
    }

    .art-card-image {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      aspect-ratio: 1;
      background: #f2f2f2;
    }

    .art-card-image img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .art-card-image img.active {
      opacity: 1;
    }

    .art-card-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(255, 255, 255, 0.88);
      padding: 12px;
      text-align: center;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .art-card:hover .art-card-overlay {
      opacity: 1;
    }

    .art-card-body {
      padding: 14px 2px 0;
      text-align: left;
    }

    .art-card-body h5 {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      margin: 0 0 4px;
      color: #222;
    }

    .art-card-body p {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.85rem;
      color: #999;
      margin: 0;
    }

    .image-dots {
      position: absolute;
      bottom: 44px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 5px;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .art-card:hover .image-dots {
      opacity: 1;
    }

    .image-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(0,0,0,0.3);
      transition: background 0.3s ease;
    }

    .image-dot.active {
      background: #222;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <div id="header-logo">
      <a href="/">
        <img src="../../images/logo/sWLogoVectorWithName.png" alt="Logo" class="logo">
      </a>
    </div>
    <div id="header-nav">
      <a href="/">HOME</a>
      <a href="/about/">ABOUT</a>
      <a href="/shop/" class="fw-bold">SHOP</a>
    </div>
  </div>

  <div class="container mt-5 pt-4 text-center">
    <a href="/shop/" class="back-link">← Back to Shop</a>
    <h1>Women Collection</h1>

    <div class="row justify-content-center g-4">

      <!-- Waiting On -->
      <div class="col-md-3 col-sm-6">
        <div class="art-card">
          <a href="waitingOn.html">
            <div class="art-card-image">
              <img src="../images/women/waitingOnSide.webp" class="active" alt="Waiting On…">
              <img src="../images/women/waitingOnRoom1.webp" alt="Waiting On… in room">
              <img src="../images/women/waitingOnRoom2.webp" alt="Waiting On… in room 2">
              <div class="image-dots">
                <div class="image-dot active"></div>
                <div class="image-dot"></div>
                <div class="image-dot"></div>
              </div>
              <div class="art-card-overlay">View Details →</div>
            </div>
            <div class="art-card-body">
              <h5>Waiting On…</h5>
              <p>From €55</p>
            </div>
          </a>
        </div>
      </div>

      <!-- Bliss -->
      <div class="col-md-3 col-sm-6">
        <div class="art-card">
          <a href="bliss.html">
            <div class="art-card-image">
              <img src="../images/women/bliss.webp" class="active" alt="Bliss">
              <img src="../images/women/blissRoom1.webp" alt="Bliss in room">
              <div class="image-dots">
                <div class="image-dot active"></div>
                <div class="image-dot"></div>
              </div>
              <div class="art-card-overlay">View Details →</div>
            </div>
            <div class="art-card-body">
              <h5>Bliss</h5>
              <p>From €55</p>
            </div>
          </a>
        </div>
      </div>

      <!-- Break -->
      <div class="col-md-3 col-sm-6">
        <div class="art-card">
          <a href="break.html">
            <div class="art-card-image">
              <img src="../images/women/break.webp" class="active" alt="Break">
              <img src="../images/women/breakRoom1.webp" alt="Break in room">
              <img src="../images/women/breakRoom2.webp" alt="Break in room 2">
              <div class="image-dots">
                <div class="image-dot active"></div>
                <div class="image-dot"></div>
                <div class="image-dot"></div>
              </div>
              <div class="art-card-overlay">View Details →</div>
            </div>
            <div class="art-card-body">
              <h5>Break</h5>
              <p>From €55</p>
            </div>
          </a>
        </div>
      </div>

      <!-- Lean Back -->
      <div class="col-md-3 col-sm-6">
        <div class="art-card">
          <a href="leanBack.html">
            <div class="art-card-image">
              <img src="../images/women/leanBack.webp" class="active" alt="Lean Back">
              <div class="art-card-overlay">View Details →</div>
            </div>
            <div class="art-card-body">
              <h5>Lean Back</h5>
              <p>From €55</p>
            </div>
          </a>
        </div>
      </div>

    </div>
  </div>

  <footer id="footer">
    <p>&copy; 2024 Sarah Woods Art. All Rights Reserved.</p>
    <p>
      <a href="https://instagram.com/sarahwoods_art" title="follow on Instagram">
        <img src="../../images/socials/instagramFooterIcon.png" alt="Instagram Logo">
      </a>
      <a href="https://linktr.ee/sarahwoodsartist" title="Linktree">
        <img src="../../images/socials/linktreeFooterIcon.png" alt="Linktree Logo">
      </a>
      <a href="mailto:sarahwoodsartist@gmail.com" title="email me">
        <img src="../../images/socials/emailFooterIcon.png" alt="Email Logo">
      </a>
    </p>
  </footer>

  <script>
    document.querySelectorAll('.art-card-image').forEach(function (stack) {
      const imgs = stack.querySelectorAll('img');
      const dots = stack.querySelectorAll('.image-dot');
      if (imgs.length <= 1) return;

      let timer = null;
      let current = 0;

      function goTo(index) {
        imgs[current].classList.remove('active');
        if (dots[current]) dots[current].classList.remove('active');
        current = index % imgs.length;
        imgs[current].classList.add('active');
        if (dots[current]) dots[current].classList.add('active');
      }

      stack.addEventListener('mouseenter', function () {
        timer = setInterval(function () {
          goTo(current + 1);
        }, 900);
      });

      stack.addEventListener('mouseleave', function () {
        clearInterval(timer);
        goTo(0);
      });
    });
  </script>

</body>
</html>
