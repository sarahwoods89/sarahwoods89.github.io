<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Woods, Woo and Words. Learn more about Sarah Woods, an Irish artist exploring the intersection of creativity, technology, and storytelling.">
  <title>About – Sarah Woods</title>
  <link rel="stylesheet" href="../sarahWoodsStyle/style.css">
  <link rel="icon" href="/images/logo/sWFaviconSmall.png" type="image/png">
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: #fff;
      color: #222;
    }

    h1 {
      font-weight: 400;
      text-align: center;
      margin: 60px 0 50px;
      font-size: 1.8rem;
      letter-spacing: 1px;
    }

    .about-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .about-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
      text-decoration: none;
      display: block;
    }

    .about-card:hover {
      transform: translateY(-5px);
    }

    .about-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      filter: brightness(85%);
      transition: filter 0.4s ease;
    }

    .about-card:hover img {
      filter: brightness(95%);
    }

    .about-card-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 40px 20px 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
      color: #fff;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: left;
    }

    @media (max-width: 768px) {
      .about-grid {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 0 16px 50px;
      }

      h1 {
        margin: 40px 0 30px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header" class="d-flex justify-content-between align-items-center px-4 py-3">
    <div id="header-logo">
      <a href="/">
        <img src="../images/logo/sWLogoVectorWithName.png" alt="Logo" class="logo">
      </a>
    </div>
    <div id="header-nav" class="d-flex gap-4">
      <a href="/">HOME</a>
      <a href="/about/" class="fw-bold">ABOUT</a>
      <a href="/shop/">SHOP</a>
    </div>
  </div>

  <h1>About</h1>

  <div class="about-grid">

    <!-- Woods -->
    <a href="https://visualartists.ie/arts-directory/directory-of-members-_/#!biz/id/6388e05af0dd0c6cb1438612/About"
       target="_blank" class="about-card">
      <img src="../images/aboutImages/woodsAboutPageImage.png" alt="Woods – Painting">
      <div class="about-card-label">Woods</div>
    </a>

    <!-- Woo -->
    <a href="https://thewoo1984.com" target="_blank" class="about-card">
      <img src="../images/aboutImages/theWooAboutPageImage.png" alt="Woo – Apparel">
      <div class="about-card-label">Woo</div>
    </a>

    <!-- Words -->
    <a href="https://thehug.xyz/artists/sarah_woods" target="_blank" class="about-card">
      <img src="../images/aboutImages/wordsAboutPageImage.png" alt="Words – Web3">
      <div class="about-card-label">Words</div>
    </a>

  </div>

  <footer id="footer">
    <p>&copy; 2024 Sarah Woods Art. All Rights Reserved.</p>
    <p>
      <a href="https://instagram.com/sarahwoods_art" title="follow on Instagram">
        <img src="../images/socials/instagramFooterIcon.png" alt="Instagram Logo">
      </a>
      <a href="https://linktr.ee/sarahwoodsartist" title="Linktree">
        <img src="../images/socials/linktreeFooterIcon.png" alt="Linktree Logo">
      </a>
      <a href="mailto:sarahwoodsartist@gmail.com" title="email me">
        <img src="../images/socials/emailFooterIcon.png" alt="Email Logo">
      </a>
    </p>
  </footer>

</body>
</html>
