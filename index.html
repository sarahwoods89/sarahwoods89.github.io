<!DOCTYPE html> <!-- x23170662 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover Sarah Woods' creative works in painting, writing, and Web3 collections.">
  <title>Sarah Woods</title>
  <link rel="icon" href="/images/logo/sWFaviconSmall.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel/slick/slick.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel/slick/slick-theme.css" />
  <link rel="stylesheet" href="sarahWoodsStyle/style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/slick-carousel/slick/slick.min.js"></script>
  <style>
    /* ── Sticky header ── */
    #header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #fff;
    }

    /* ── Hamburger button ── */
    #hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      flex-direction: column;
      gap: 5px;
    }

    #hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: #222;
      transition: all 0.3s ease;
    }

    /* ── Mobile menu ── */
    #mobile-menu {
      display: none;
      position: fixed;
      top: 120px;
      left: 0; right: 0;
      background: #fff;
      border-top: 1px solid #eee;
      padding: 20px 0;
      z-index: 999;
      text-align: center;
    }

    #mobile-menu a {
      display: block;
      padding: 14px 0;
      font-family: sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      color: #222;
      text-decoration: none;
    }

    #mobile-menu a.fw-bold {
      font-weight: 700;
    }

    /* ── Hero section ── */
    #hero {
      padding: 60px 0 40px;
      text-align: center;
    }

    #typewriter {
      text-align: center !important;
    }

    /* ── Section shared styles ── */
    .page-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    .section-heading {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 40px;
      text-align: center;
    }


    /* ── Shop preview section ── */
    #shop-section {
      text-align: center;
    }

    .collections-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 40px;
    }

    .collection-card-home {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .collection-card-home:hover {
      transform: translateY(-5px);
    }

    .collection-card-home img,
    .collection-card-home video {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      filter: brightness(88%);
      transition: filter 0.4s ease;
    }

    .collection-card-home:hover img,
    .collection-card-home:hover video {
      filter: brightness(100%);
    }

    .collection-card-home .card-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 16px 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.45));
      color: #fff;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: left;
    }

    .shop-link {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 1px;
      color: #222;
      text-decoration: none;
      border-bottom: 1px solid #222;
      padding-bottom: 2px;
      transition: opacity 0.3s;
    }

    .shop-link:hover {
      opacity: 0.5;
    }

    /* ── Shorts section ── */
    #shorts-section {
      background: #f9f9f9;
    }

    .shorts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 40px;
    }

    .shorts-grid iframe {
      width: 100%;
      aspect-ratio: 9/16;
      border: none;
      border-radius: 12px;
    }

    .shorts-placeholder {
      width: 100%;
      aspect-ratio: 9/16;
      border-radius: 12px;
      background: #e8e8e8;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── Mobile responsive ── */
    @media (max-width: 768px) {
      #header-nav {
        display: none !important;
      }

      #hamburger {
        display: flex;
      }


      .collections-grid,
      .shorts-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .page-section {
        padding: 50px 20px;
      }

      #hero {
        padding: 30px 0 20px;
      }
    }
  </style>
</head>
<body>

  <div id="site-header"></div>

  <!-- Mobile menu -->
  <div id="mobile-menu">
    <a href="/" class="fw-bold">HOME</a>
    <a href="/about/">ABOUT</a>
    <a href="/shop/">SHOP</a>
  </div>

  <!-- Hero -->
  <section id="hero">
    <div class="introText">
      <p id="typewriter"></p>
    </div>
    <br>
    <div id="content">
      <div class="carousel-container">
        <div class="carousel">
          <div><img src="images/pictures/neurogenesisJump.webp" alt="Neurogenesis abstract painting"></div>
          <div><img src="images/pictures/playPrintTwo.webp" alt="Play print"></div>
          <div><img src="images/pictures/commonGroundsPainting.webp" alt="Common Grounds Painting"></div>
          <div><img src="images/pictures/slothPainting.webp" alt="Sloth painting"></div>
          <div><img src="images/pictures/commonGroundsJump.webp" alt="Jumping in front of painting"></div>
          <div><img src="images/pictures/spinCity.webp" alt="Spin City painting"></div>
          <div><img src="images/pictures/playPrint.webp" alt="Play print"></div>
          <div><img src="images/pictures/ireland.webp" alt="Ireland"></div>
          <div><img src="images/pictures/vogueMagazineLeft.webp" alt="Vogue magazine"></div>
          <div><img src="images/pictures/vogueMagazineRight.webp" alt="Vogue magazine"></div>
          <div><img src="images/pictures/theWooBag.webp" alt="The Woo bag"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Shop preview -->
  <section id="shop-section">
    <div class="page-section">
      <p class="section-heading">Shop Collections</p>
      <div class="collections-grid">

        <a href="/shop/sarahwords/" style="text-decoration:none">
          <div class="collection-card-home">
            <video autoplay muted loop playsinline>
              <source src="videos/allIsWellVideo.mp4" type="video/mp4">
              <source src="videos/allIsWellVideo.MOV" type="video/quicktime">
            </video>
            <div class="card-label">Sarah Words</div>
          </div>
        </a>

        <a href="/shop/women/women.html" style="text-decoration:none">
          <div class="collection-card-home">
            <img src="shop/collection-covers/women.webp" alt="Women Collection" loading="lazy">
            <div class="card-label">Women</div>
          </div>
        </a>

        <a href="/shop/florals/" style="text-decoration:none">
          <div class="collection-card-home">
            <img src="shop/images/abstracts/onTheHill.jpg" alt="Florals Collection" loading="lazy">
            <div class="card-label">Florals</div>
          </div>
        </a>

      </div>
      <a href="/shop/" class="shop-link">View all collections →</a>
    </div>
  </section>

  <!-- Shorts section -->
  <section id="shorts-section">
    <div class="page-section">
      <p class="section-heading">Latest Shorts</p>
      <div id="shorts-grid" class="shorts-grid">
        <!-- Populated by YouTube API -->
        <div class="shorts-placeholder"></div>
        <div class="shorts-placeholder"></div>
        <div class="shorts-placeholder"></div>
      </div>
      <a href="https://www.youtube.com/@sarahwords/shorts" target="_blank" class="shop-link">View all on YouTube →</a>
    </div>
  </section>


  <div id="site-footer"></div>

  <script>
    // Slick carousel
    $(window).on('load', function () {
      $('.carousel').slick({
        infinite: true,
        slidesToShow: 3,
        slidesToScroll: 1,
        autoplay: true,
        autoplaySpeed: 0,
        arrows: false,
        dots: false,
        speed: 6000,
        cssEase: 'linear',
        variableWidth: true,
        centerMode: true,
        responsive: [
          {
            breakpoint: 768,
            settings: {
              slidesToShow: 1,
              centerMode: false,
              variableWidth: true
            }
          }
        ]
      });
    });

    // Typewriter
    document.addEventListener("DOMContentLoaded", function () {
      const text = "Painting. Writing. Web3";
      const speed = 100;
      const cursorTimeout = 1000;
      let index = 0;

      function typeWriter() {
        if (index < text.length) {
          document.getElementById("typewriter").textContent += text.charAt(index);
          index++;
          setTimeout(typeWriter, speed);
        } else {
          setTimeout(() => {
            document.getElementById("typewriter").style.borderRight = "none";
          }, cursorTimeout);
        }
      }
      typeWriter();
    });

    // YouTube Shorts
    (function () {
      const API_KEY = 'AIzaSyDd5g5qP40R2l0xJvrSBZEZiYELqmDAMhQ';
      const CHANNEL_ID = 'UCrzN18GLrCqfPTd-7Mj-lzQ';
      const PLAYLIST_ID = 'UU' + CHANNEL_ID.slice(2);
      const grid = document.getElementById('shorts-grid');

      fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${PLAYLIST_ID}&maxResults=3&key=${API_KEY}`)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (!data.items || data.items.length === 0) return;
          grid.innerHTML = data.items.map(function (item) {
            const id = item.snippet.resourceId.videoId;
            return `<iframe
              src="https://www.youtube.com/embed/${id}?autoplay=0&rel=0"
              title="${item.snippet.title}"
              allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
              loading="lazy">
            </iframe>`;
          }).join('');
        })
        .catch(function () {
          grid.innerHTML = '';
        });
    })();

    // Hamburger menu
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    let menuOpen = false;

    hamburger.addEventListener('click', function () {
      menuOpen = !menuOpen;
      mobileMenu.style.display = menuOpen ? 'block' : 'none';
    });

    // Close menu when a link is tapped
    mobileMenu.querySelectorAll('a').forEach(function (link) {
      link.addEventListener('click', function () {
        mobileMenu.style.display = 'none';
        menuOpen = false;
      });
    });
  </script>

  <script src="/sarahWoodsStyle/include.js"></script>
</body>
</html>
